
# ——— Just the Docs 基础配置示例 ———
# 将此文件放在仓库根目录，用于 GitHub Pages 构建

# 站点基础信息
title: AI Notes
description: CS224N Lecture 5 学习笔记（Attention & Transformers）
url: https://<your-username>.github.io/<your-repo>

# 主题与构建
theme: just-the-docs
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Just the Docs 专属设置
just_the_docs:
  search_enabled: true
  # 可选：更换配色
  # color_scheme: dark

# 数学公式（KaTeX via kramdown）
kramdown:
  math_engine: katex
  input: GFM

# 可选：站点外链
aux_links:
  GitHub 仓库: https://github.com/<your-username>/<your-repo>
  CS224N 课程主页: https://web.stanford.edu/class/cs224n/

# GitHub Pages 分支设置（也可在 Settings → Pages 配置）
# 若用 main 分支根目录：
# defaults:
#   - scope:
#       path: ""
#     values:
#       layout: default
